name: AI_QA_Flow
on:
  push:
    paths:
      - 'requirements/**' # 只要需求資料夾有變動就執行
jobs:
  ai_job:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install requests
      - name: AI Review
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
        run: python scripts/qa_agent.py requirements/PRD.md
