name: AI_QA_Flow
on:
  workflow_dispatch:

jobs:
  ai_job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node & Python
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Python Package
        run: pip install -q -U google-generativeai

      - name: Install Playwright
        # 分開執行，確保安裝完整
        run: |
          npm init -y
          npm install @playwright/test typescript
          npx playwright install --with-deps chromium

      - name: Generate AI Code
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
        run: python scripts/qa_agent.py requirements/PRD.md

      - name: Check Generated File
        # 這是 Debug 關鍵：檢查檔案到底有沒有生出來
        run: ls -R tests/

      - name: Run Tests
        run: npx playwright test
        continue-on-error: true

      - name: Print Generated Code for Debugging
        # 就算沒 Artifact，我們直接把內容印在黑視窗裡看！
        run: |
          echo "--- START OF CODE ---"
          cat tests/gen_playwright.spec.ts
          echo "--- END OF CODE ---"

      - name: Upload Everything
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: full-project-debug
          path: .
          # 加入這個，強制讓它存在更久
          retention-days: 1
