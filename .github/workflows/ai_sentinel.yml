name: AI_QA_Flow
on:
  workflow_dispatch:

jobs:
  ai_job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node & Python
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -q -U google-generativeai
          npm init -y
          npm install @playwright/test typescript
          npx playwright install --with-deps chromium

      - name: Generate AI Code
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
        run: python scripts/qa_agent.py requirements/PRD.md

      - name: Run Tests with Visual Evidence
        # 關鍵：強制產出 trace，且就算失敗也繼續往下走
        run: npx playwright test --reporter=html --trace on
        continue-on-error: true

      - name: Upload Results
        uses: actions/upload-artifact@v4
        if: always() # 這是保險，確保報告一定會上傳
        with:
          name: playwright-visual-report
          path: playwright-report/
          retention-days: 7
