name: AI_QA_Flow
on:
  push:
    paths:
      - 'requirements/**'
  workflow_dispatch:

jobs:
  ai_job:
    runs-on: ubuntu-latest
    permissions: # 賦予寫入權限
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install -q -U google-generativeai
        
      - name: Run AI Review and Generate File
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
        run: python scripts/qa_agent.py requirements/PRD.md
        
      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add tests/*.spec.ts
          git commit -m "docs: AI 根據需求自動產出 Playwright 測試腳本" || echo "No changes to commit"
          git push
