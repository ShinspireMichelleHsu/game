name: AI_QA_Flow
on:
  workflow_dispatch:

jobs:
  ai_job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node & Python
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -q -U google-generativeai
          npm init -y
          npm install @playwright/test typescript
          npx playwright install --with-deps chromium

      - name: Generate AI Code
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
        run: python scripts/qa_agent.py requirements/PRD.md

      - name: Run Tests
        run: npx playwright test --reporter=list # 使用清單模式，失敗會直接印在畫面上
        continue-on-error: true

      - name: Upload Evidence
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ai-test-evidence
          path: |
            playwright-report/
            screenshot.png
            test-results/
