name: AI_QA_Flow
on:
  push:
    paths:
      - 'requirements/**'
  workflow_dispatch:    # <--- 必須有這一行，按鈕才會出現！
jobs:
  ai_job:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install -q -U google-generativeai
      - name: AI Review
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
        run: python scripts/qa_agent.py requirements/PRD.md
